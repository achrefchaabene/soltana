<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soltana Food - Officiel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: #0a0a0c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: linear-gradient(145deg, #121216, #1a1a22);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(212, 175, 55, 0.05);
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            background-color: #0a0a0c;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #f3e5ab;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 14px;
            color: #b0b0b8;
            margin-bottom: 35px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .links-wrapper {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-insta {
            background: linear-gradient(45deg, #f09433, #dc2743, #bc1888);
        }

        .btn-fb {
            background-color: #1877f2;
        }

        .btn-tiktok {
            background-color: #000000;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-tiktok:hover {
            border-color: #d4af37;
        }

        .btn-maps {
            background-color: #ea4335;
            box-shadow: 0 4px 15px rgba(234, 67, 53, 0.2);
        }

        .btn-wa {
            background-color: #25d366;
        }

        .footer {
            margin-top: 35px;
            font-size: 12px;
            color: #666670;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-container">
            <img src="soltana.jpg" alt="Soltana Food Logo">
        </div>

        <h1>Soltana Food</h1>
        <div class="tagline">The King</div>

        <div class="links-wrapper">
            <a href="https://www.instagram.com/resto.soltana_pro_max?igsh=ejM5YjlpMDN2NHg1" class="btn btn-insta" target="_blank" rel="noopener noreferrer">Instagram Officiel</a>
            <a href="https://www.facebook.com/share/18wM9tWW6v/?mibextid=wwXIfr" class="btn btn-fb" target="_blank" rel="noopener noreferrer">Page Facebook</a>
            <a href="https://www.tiktok.com/@soltana.food.theking?_r=1&_t=ZS-97T1pQd0MU8" class="btn btn-tiktok" target="_blank" rel="noopener noreferrer">TikTok Vidéos</a>
            <a href="https://maps.app.goo.gl/od9E5GgE4xdy2Kxw6?g_st=ac" class="btn btn-maps" target="_blank" rel="noopener noreferrer">Notre Position (Google Maps)</a>
            <a href="https://wa.me/21623789338" class="btn btn-wa" target="_blank" rel="noopener noreferrer">Contact Direct WhatsApp</a>
        </div>

        <div class="footer">
            &copy; 2026 Soltana Food. Tous droits réservés.
        </div>
    </div>
</body>
</html>
